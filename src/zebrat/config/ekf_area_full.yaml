ekf_filter_node:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    odom0: /wheel/odom
    odom0_config: [
      true,  true,  false,
      false, false, false,
      true,  false, false,
      false, false, true,
      false, false, false
    ]
    odom0_queue_size: 20
    odom0_nodelay: false
    odom0_differential: false
    odom0_relative: false

    imu0: /imu/data
    imu0_config: [
      false, false, false,
      false, false, true,
      false, false, false,
      false, false, true,
      false, false, false
    ]
    imu0_queue_size: 50
    imu0_nodelay: false
    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: false
