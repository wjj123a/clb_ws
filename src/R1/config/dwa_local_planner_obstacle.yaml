base_global_planner: navfn/NavfnROS
base_local_planner: dwa_local_planner/DWAPlannerROS

planner_frequency: 2.0
controller_frequency: 10.0
planner_patience: 3.0
controller_patience: 10.0
oscillation_timeout: 8.0
oscillation_distance: 0.30
shutdown_costmaps: false
recovery_behavior_enabled: true
clearing_rotation_allowed: true

DWAPlannerROS:
  odom_topic: odom
  holonomic_robot: false

  max_vel_x: 0.22
  min_vel_x: -0.06
  max_vel_trans: 0.22
  min_vel_trans: 0.00
  max_vel_theta: 0.50
  min_vel_theta: 0.10

  acc_lim_x: 0.90
  acc_lim_theta: 0.80

  yaw_goal_tolerance: 0.45
  xy_goal_tolerance: 0.20
  latch_xy_goal_tolerance: true

  sim_time: 2.4
  sim_granularity: 0.025
  angular_sim_granularity: 0.05
  vx_samples: 18
  vy_samples: 0
  vth_samples: 36

  path_distance_bias: 18.0
  goal_distance_bias: 10.0
  occdist_scale: 0.35
  forward_point_distance: 0.24
  stop_time_buffer: 0.30
  scaling_speed: 0.16
  max_scaling_factor: 0.20

  oscillation_reset_dist: 0.45
  prune_plan: true
  publish_traj_pc: false
  publish_cost_grid_pc: false
  meter_scoring: true
