recovery_behavior_enabled: true
clearing_rotation_allowed: false

recovery_behaviors:
  - name: conservative_reset
    type: clear_costmap_recovery/ClearCostmapRecovery
  - name: aggressive_reset
    type: clear_costmap_recovery/ClearCostmapRecovery

conservative_reset:
  reset_distance: 0.80
  force_updating: true
  affected_maps: local

aggressive_reset:
  reset_distance: 3.00
  force_updating: true
  affected_maps: both
