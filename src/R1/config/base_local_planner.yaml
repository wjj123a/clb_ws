base_global_planner: global_planner/GlobalPlanner
base_local_planner: dwa_local_planner/DWAPlannerROS

planner_frequency: 2.0
controller_frequency: 10.0
planner_patience: 3.0
controller_patience: 5.0
oscillation_timeout: 10.0
oscillation_distance: 0.20
shutdown_costmaps: false
recovery_behavior_enabled: true
clearing_rotation_allowed: true

DWAPlannerROS:
  holonomic_robot: false

  max_vel_x: 0.22
  min_vel_x: 0.00
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.22
  min_vel_trans: 0.06
  max_vel_theta: 0.60
  min_vel_theta: 0.20

  acc_lim_x: 0.50
  acc_lim_y: 0.0
  acc_lim_theta: 0.90

  xy_goal_tolerance: 0.12
  yaw_goal_tolerance: 0.10
  latch_xy_goal_tolerance: true

  sim_time: 1.8
  vx_samples: 12
  vy_samples: 1
  vth_samples: 24

  path_distance_bias: 32.0
  goal_distance_bias: 18.0
  occdist_scale: 0.12
  forward_point_distance: 0.20
  stop_time_buffer: 0.25
  scaling_speed: 0.18
  max_scaling_factor: 0.20
  oscillation_reset_dist: 0.15

  publish_traj_pc: false
  publish_cost_grid_pc: false
