DWAPlannerROS:
  holonomic_robot: false
  max_vel_x: 0.22
  min_vel_x: 0.02
  max_vel_y: 0.0
  min_vel_y: 0.0
  max_vel_trans: 0.22
  min_vel_trans: 0.02
  max_vel_theta: 0.12
  min_vel_theta: 0.02
  trans_stopped_vel: 0.015
  theta_stopped_vel: 0.03
  acc_lim_x: 0.40
  acc_lim_y: 0.0
  acc_lim_theta: 0.80
  acc_lim_trans: 0.40
  xy_goal_tolerance: 0.35
  yaw_goal_tolerance: 0.70
  latch_xy_goal_tolerance: true
  sim_time: 2.0
  sim_granularity: 0.05
  angular_sim_granularity: 0.05
  vx_samples: 10
  vy_samples: 1
  vth_samples: 14
  path_distance_bias: 42.0
  goal_distance_bias: 20.0
  occdist_scale: 0.08
  stop_time_buffer: 0.25
  oscillation_reset_dist: 0.10
  oscillation_reset_angle: 0.20
  forward_point_distance: 0.15
  scaling_speed: 0.18
  max_scaling_factor: 0.15
  publish_cost_grid_pc: true
  publish_traj_pc: true
  prune_plan: true
  use_dwa: true
