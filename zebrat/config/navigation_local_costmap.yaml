local_costmap:
  global_frame: odom
  robot_base_frame: base_footprint
  update_frequency: 10.0
  publish_frequency: 5.0
  transform_tolerance: 0.4
  static_map: false
  rolling_window: true
  width: 8.0
  height: 8.0
  resolution: 0.05
  track_unknown_space: false
  always_send_full_costmap: true
  footprint:
    - [0.30, 0.18]
    - [0.30, -0.18]
    - [-0.30, -0.18]
    - [-0.30, 0.18]
  footprint_padding: 0.02
  plugins:
    - {name: obstacle_layer, type: "costmap_2d::ObstacleLayer"}
    - {name: inflation_layer, type: "costmap_2d::InflationLayer"}
  obstacle_layer:
    track_unknown_space: false
    observation_sources: laser_scan_sensor depth_cloud_sensor
    laser_scan_sensor:
      sensor_frame: laser_link
      data_type: LaserScan
      topic: /scan
      marking: true
      clearing: true
      inf_is_valid: true
      observation_persistence: 0.0
      expected_update_rate: 0.0
      obstacle_range: 4.5
      raytrace_range: 5.5
    depth_cloud_sensor:
      sensor_frame: camera_optical_link
      data_type: PointCloud2
      topic: /front_camera/depth/points
      marking: true
      clearing: true
      min_obstacle_height: 0.05
      max_obstacle_height: 1.80
      observation_persistence: 0.0
      expected_update_rate: 0.0
      obstacle_range: 3.2
      raytrace_range: 3.6
  inflation_layer:
    inflation_radius: 0.42
    cost_scaling_factor: 8.0
